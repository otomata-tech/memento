name: Tests

# Integration tests of the Edge Functions (deno test) against a real Postgres.
# The mem_* schema is applied via the Drizzle migrations (server/drizzle, 0015 included);
# the auth.users schema is provisioned by the tests themselves (cf. seedUser).

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "server/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "supabase/**"
      - "server/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector preinstalled: the embeddings migration (#10) runs `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tuls
          POSTGRES_PASSWORD: tuls-dev
          POSTGRES_DB: memento
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tuls:tuls-dev@localhost:5432/memento
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # We materialize the canonical TS schema (drizzle-kit push) rather than the SQL
      # migration chain: the latter carries Supabase-only steps (pg_cron #0014,
      # pgvector #0006) absent from a CI Postgres. `push` creates all the mem_*
      # tables the tests need, without those extensions. `--force` = non-interactive.
      - name: Provision schema (drizzle push)
        working-directory: server
        run: |
          npm ci
          npx drizzle-kit push --force

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno test
        working-directory: supabase/functions
        run: deno test --allow-env --allow-net --allow-read _shared/
