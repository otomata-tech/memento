name: Deploy viewer to Cloudflare Pages

# The viewer (app/) is hosted on Cloudflare Pages; the Pages Functions (app/functions/)
# proxy /mcp, /api/*, /.well-known/* to the Supabase Edge Functions.
# Deploys Otomata's hosted instance (mento.cc); gated by repository_owner so that
# a fork does not deploy our prod (configure your own secrets/project for yours).

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: github.repository_owner == 'otomata-tech'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Build
        working-directory: app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # PostHog Project API Key (phc_) is publishable (write-only ingestion) → safe inline.
          VITE_POSTHOG_KEY: phc_wYEankhdv3AnCE7JEMeiiidt6yssKXRnkAn36TpFdesC
          VITE_POSTHOG_HOST: https://eu.i.posthog.com
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: app
          command: pages deploy dist --project-name=memento-viewer --branch=main
