name: Deploy NER (v3)

# Déploie le micro-service NER (dossier ner/, FastAPI+GLiNER) sur sa box dédiée
# memento-ner (51.159.135.119), à chaque push sur memento-v3 touchant ner/**.
#
# La clé SSH_DEPLOY_KEY_NER est ÉPINGLÉE en forced-command sur /opt/deploy/memento-ner.sh
# côté box : le `script:` ci-dessous ne fait que « sonner à la porte », toute la logique
# (sparse-checkout ner/, rsync, pip si requirements changé, restart, smoke /health) vit
# dans /opt/deploy/memento-ner.sh. Pour changer le déploiement : éditer ce script.
# Gated par repository_owner (un fork ne déploie pas notre prod).

on:
  push:
    branches: [memento-v3]
    paths:
      - "ner/**"
      - ".github/workflows/deploy-ner-v3.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ner-v3
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository_owner == 'otomata-tech'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy NER to memento-ner box
        # Pin par SHA (un tag re-poussé = exécution arbitraire avec accès au secret).
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        with:
          host: 51.159.135.119 # memento-ner (PLAY2-NANO, fr-par-2)
          username: root
          key: ${{ secrets.SSH_DEPLOY_KEY_NER }}
          script: deploy memento-ner # ignoré — la clé force /opt/deploy/memento-ner.sh
