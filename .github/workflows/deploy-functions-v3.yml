name: Deploy edge functions (v3)

# Déploie les Edge Functions v3 (api-v3 + mcp-v3) sur le projet Supabase de PROD
# mento.cc (ref doebdriroupduqpggcsj) à chaque push sur la branche memento-v3.
# ⚠️ Cutover 2026-06-28 (issue #58) : v3 est LIVE en prod, consolidé in-project —
# les tables v3 vivent dans le schéma `memento_v3` de ce projet (db.v3.ts pose le
# search_path), v2 reste dans `public` jusqu'à son retrait. L'ancien projet
# blue-green hhvjbnhpjpxuicgviutt est ABANDONNÉ — ne plus rien y déployer.
# PAS de migration DB ici (les migrations v3 sont sensibles → appliquées à la main).
# Gated par repository_owner (un fork ne déploie pas notre prod).
#
# Secret requis : SUPABASE_ACCESS_TOKEN (account-level, couvre le projet v3).

on:
  push:
    branches: [memento-v3]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-functions-v3.yml"
  workflow_dispatch:

concurrency:
  group: deploy-functions-v3
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository_owner == 'otomata-tech'
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: doebdriroupduqpggcsj # projet PROD mento.cc (cutover #58) — ref publique
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Deploy functions v3 (api-v3 + mcp-v3)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          rm -f supabase/functions/deno.lock
          supabase functions deploy api-v3 --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          supabase functions deploy mcp-v3 --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
